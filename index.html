<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RPG Shopkeeper</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Crimson Text', Georgia, serif;
      background-color: #0f0a1a;
      color: #e8dcc8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
      position: relative;
    }

    /* Subtle radial glow behind content */
    body::before {
      content: '';
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 800px;
      height: 800px;
      background: radial-gradient(
        ellipse at center,
        rgba(100, 50, 140, 0.12) 0%,
        rgba(60, 30, 90, 0.06) 40%,
        transparent 70%
      );
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 3rem 1.5rem;
      max-width: 480px;
      width: 100%;
    }

    /* Hero image */
    .hero-image {
      width: 240px;
      height: auto;
      margin-bottom: 2rem;
      filter: drop-shadow(0 8px 32px rgba(100, 50, 140, 0.35));
      transition: transform 0.4s ease, filter 0.4s ease;
    }

    .hero-image:hover {
      transform: scale(1.03) translateY(-2px);
      filter: drop-shadow(0 12px 40px rgba(100, 50, 140, 0.5));
    }

    /* Title */
    .title {
      font-family: 'Cinzel', serif;
      font-weight: 600;
      font-size: 1.6rem;
      color: #d4a44c;
      text-align: center;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }

    .subtitle {
      font-family: 'Crimson Text', serif;
      font-style: italic;
      font-size: 1.05rem;
      color: #8a7a9e;
      text-align: center;
      margin-bottom: 2rem;
      letter-spacing: 0.04em;
    }

    /* Ornamental divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 2rem;
      width: 100%;
      max-width: 280px;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, #d4a44c40, transparent);
    }

    .divider-gem {
      width: 6px;
      height: 6px;
      background: #d4a44c;
      transform: rotate(45deg);
      flex-shrink: 0;
      opacity: 0.7;
    }

    /* Navigation */
    .nav-list {
      list-style: none;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .nav-item a {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 1.25rem;
      color: #e8dcc8;
      text-decoration: none;
      font-family: 'Cinzel', serif;
      font-weight: 400;
      font-size: 0.85rem;
      letter-spacing: 0.08em;
      border: 1px solid rgba(212, 164, 76, 0.12);
      border-radius: 4px;
      background: rgba(255, 255, 255, 0.02);
      transition: all 0.25s ease;
      position: relative;
    }

    .nav-item a:hover,
    .nav-item a:focus {
      background: rgba(212, 164, 76, 0.08);
      border-color: rgba(212, 164, 76, 0.35);
      color: #d4a44c;
      outline: none;
    }

    .nav-item a:active {
      background: rgba(212, 164, 76, 0.14);
    }

    .nav-item .icon {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
      fill: currentColor;
      opacity: 0.5;
      transition: opacity 0.25s ease;
    }

    .nav-item a:hover .icon {
      opacity: 0.8;
    }

    /* Arrow indicator on hover */
    .nav-item a::after {
      content: '\2192';
      font-size: 0.9rem;
      opacity: 0;
      transform: translateX(-4px);
      transition: all 0.25s ease;
      position: absolute;
      right: 1.25rem;
    }

    .nav-item a:hover::after {
      opacity: 0.6;
      transform: translateX(0);
    }

    .nav-item a:hover .icon {
      opacity: 0;
    }

    /* Footer */
    .footer {
      margin-top: 3rem;
      font-family: 'Crimson Text', serif;
      font-size: 0.8rem;
      color: #3d3154;
      text-align: center;
      letter-spacing: 0.1em;
    }

    /* Responsive */
    @media (max-width: 480px) {
      .container {
        padding: 2rem 1.25rem;
      }

      .title {
        font-size: 1.3rem;
      }

      .hero-image {
        width: 200px;
      }

      .nav-item a {
        font-size: 0.78rem;
        padding: 0.85rem 1rem;
      }
    }
  </style>
</head>
